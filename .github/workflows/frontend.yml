name: OpsHub Frontend Hardened CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  frontend-audit:
    name: Frontend Audit & Compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Setup Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: ./frontend/package-lock.json

    - name: Cache NextJS Compilation Cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/frontend/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

    - name: Install System Dependencies
      run: npm ci

    - name: Run Strict TypeScript Verification
      run: npx tsc --noEmit

    - name: Verify Web Pack Production Bundle Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://api.opshub.enterprise/api/v1
        NODE_ENV: production
