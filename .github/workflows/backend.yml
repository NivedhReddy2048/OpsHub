name: OpsHub Backend Hardened CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  backend-audit:
    name: Backend Pytest & Migrations Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django factory-boy drf-spectacular

    - name: Execute Pytest Suite
      env:
        DJANGO_SETTINGS_MODULE: config.settings.development
      run: pytest

    - name: Audit Django Migrations (No Conflict dry-run)
      run: python manage.py makemigrations --check --dry-run
